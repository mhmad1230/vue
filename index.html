<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payload Injector Pro</title>

<style>
:root {
    --bg1: #0f172a;
    --bg2: #020617;
    --primary: #00f5ff;
    --secondary: #3b82f6;
    --glass: rgba(255,255,255,0.05);
}

/* خلفية متحركة */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: white;
    overflow-x: hidden;
}

/* Glow خلفي */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #00f5ff33, transparent 70%);
    top: -100px;
    left: -100px;
    animation: moveGlow 10s infinite alternate;
}

@keyframes moveGlow {
    0% { transform: translate(0,0); }
    100% { transform: translate(200px,150px); }
}

/* العنوان */
h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 3rem;
    background: linear-gradient(90deg, #00f5ff, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
}

/* الكارد */
#payload-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 25px;
    padding: 40px;
    max-width: 1100px;
    margin: auto;
}

/* زر احترافي */
.payload-btn {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: bold;
    text-align: center;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* Glow */
.payload-btn::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background: linear-gradient(120deg, transparent, #00f5ff55, transparent);
    top: -10%;
    left: -10%;
    transform: rotate(25deg);
    opacity: 0;
    transition: 0.5s;
}

.payload-btn:hover::before {
    opacity: 1;
    animation: shine 1s linear;
}

@keyframes shine {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
}

.payload-btn:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 0 20px #00f5ff66;
    border-color: var(--primary);
}

/* عند الضغط */
.payload-btn:active {
    transform: scale(0.95);
}

/* شريط الحالة */
.status-bar {
    margin: 30px auto;
    padding: 15px;
    width: 80%;
    max-width: 700px;
    text-align: center;
    border-radius: 10px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid #00f5ff33;
    color: #00f5ff;
    font-family: monospace;
}

/* Loader */
.loader {
    display: none;
    margin: 10px auto;
    border: 4px solid #ffffff22;
    border-top: 4px solid #00f5ff;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1>⚡ PAYLOAD INJECTOR ⚡</h1>

<div id="payload-container"></div>

<div class="status-bar" id="status">🚀 Ready...</div>
<div class="loader" id="loader"></div>

<script src="payloads.js"></script>

<script>
const container = document.getElementById('payload-container');
const statusDiv = document.getElementById('status');
const loader = document.getElementById('loader');

window.alert = function(msg){
    statusDiv.textContent = msg;
    loader.style.display = "none";
};

function renderButtons(list){
    container.innerHTML = "";

    list.forEach(payload=>{
        const btn = document.createElement('div');
        btn.className = 'payload-btn';

        // إضافة أيقونة
        btn.innerHTML = "📦<br>" + payload;

        btn.onclick = ()=>{
            statusDiv.textContent = "⏳ Injecting: " + payload;
            loader.style.display = "block";

            // تحميل
            const a = document.createElement('a');
            a.href = "payloads/" + payload;
            a.download = payload;
            a.click();

            // تشغيل
            if(window.Loadpayloadlocal){
                window.Loadpayloadlocal("payloads/" + payload);
            } else {
                statusDiv.textContent = "❌ Function not found";
                loader.style.display = "none";
            }
        };

        container.appendChild(btn);
    });
}

async function fetchPayloads(){
    try{
        const res = await fetch("payloads.json");
        const data = await res.json();
        renderButtons(data);
        statusDiv.textContent = "✅ Loaded " + data.length + " payloads";
    }catch(e){
        statusDiv.textContent = "❌ Error loading payloads";
    }
}

window.onload = fetchPayloads;
</script>

</body>
</html>
