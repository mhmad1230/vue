<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payload Injector</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #3b82f6; 
            --primary-hover: #2563eb;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2.5rem;
            text-align: center;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.4);
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        #payload-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .payload-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid #334155;
            padding: 18px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-all;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .payload-btn:hover {
            border-color: var(--primary);
            background-color: var(--primary-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
        }

        .payload-btn:active {
            transform: translateY(0);
        }

        .status-bar {
            margin-top: 3rem;
            padding: 15px 30px;
            border-radius: 8px;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--primary);
            font-family: monospace;
            font-size: 1.2rem;
            color: #60a5fa;
            width: 80%;
            max-width: 800px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🚀 Payload Injector</h1>

    <div id="payload-container">
        </div>

    <div class="status-bar" id="status">Initializing... Scanning for payloads.</div>

    <script src="payloads.js"></script>

    <script>
        const container = document.getElementById('payload-container');
        const statusDiv = document.getElementById('status');

        window.alert = function(message) {
            statusDiv.textContent = `Status: ${message}`;
        };

        // Function to render the buttons
        function renderButtons(payloadsList) {
            container.innerHTML = ''; // Clear container

            if (payloadsList.length === 0) {
                statusDiv.textContent = "Error: No .bin or .elf files found in 'payloads' directory.";
                return;
            }

            payloadsList.forEach(payload => {
                const btn = document.createElement('button');
                btn.className = 'payload-btn';
                btn.textContent = payload; // Display only the filename

                btn.onclick = () => {
                    statusDiv.textContent = `⏳ Injecting: ${payload}...`;
                    
                    if (typeof window.Loadpayloadlocal === 'function') {
                        try {
                            window.Loadpayloadlocal("payloads/" + payload);
                        } catch (error) {
                            statusDiv.textContent = `❌ Injection Error!`;
                            console.error(error);
                        }
                    } else {
                        statusDiv.textContent = "❌ Error: Loadpayloadlocal function not found.";
                    }
                };

                container.appendChild(btn);
            });
        }

        // Fetch the JSON index file instead of the directory
        async function fetchPayloads() {
            try {
                const response = await fetch('payloads.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const payloadsArray = await response.json();
                
                if (payloadsArray.length === 0) {
                    statusDiv.textContent = "⚠️ No payloads found in index.";
                    return;
                }

                renderButtons(payloadsArray);
                statusDiv.textContent = `✅ Ready. Found ${payloadsArray.length} payloads.`;

            } catch (error) {
                console.error("Fetch Error:", error);
                statusDiv.textContent = "❌ Failed to read 'payloads.json'. Please ensure the index file is generated.";
            }
        }

        window.onload = fetchPayloads;
    </script>
</body>
</html>
